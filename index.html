<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estadoro - Em Construção</title>
  <meta name="description" content="O Estadoro está em construção. Em breve estaremos no ar." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ffffff;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 560px; }
    .logo {
      width: 200px;
      max-width: 80%;
      margin: 0 auto 32px;
      display: block;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 17px;
      opacity: 0.75;
      line-height: 1.6;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      font-size: 14px;
      color: #4ade80;
      background: rgba(74,222,128,0.1);
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(74,222,128,0.2);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <svg class="logo" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
        font-size="42" font-weight="800" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif"
        letter-spacing="-1">estadoro</text>
    </svg>
    <h1>Em Construção</h1>
    <p>Estamos trabalhando para entregar algo incrível. Em breve estaremos no ar.</p>
    <div class="status">
      <span class="dot"></span>
      Site em desenvolvimento
    </div>
  </main>
</body>
</html>
